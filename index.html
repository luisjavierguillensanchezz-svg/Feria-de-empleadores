<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Feria de Empleadores UV</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial, Helvetica, sans-serif;
}

body{
  background:#f2f5fb;
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  padding:20px;
}

.container{
  width:100%;
  max-width:700px;
  background:white;
  border-radius:22px;
  padding:35px;
  box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

.header{
  text-align:center;
  margin-bottom:30px;
}

.header h1{
  color:#0b3d91;
  margin-bottom:10px;
}

.header p{
  color:#555;
}

.tabs{
  display:flex;
  gap:10px;
  margin-bottom:25px;
}

.tab{
  flex:1;
  border:none;
  padding:15px;
  border-radius:12px;
  background:#dfe8f7;
  cursor:pointer;
  font-weight:bold;
  transition:0.3s;
}

.tab.active{
  background:#0b3d91;
  color:white;
}

form{
  display:none;
}

form.active{
  display:block;
}

.group{
  margin-bottom:18px;
}

label{
  display:block;
  margin-bottom:8px;
  font-weight:bold;
  color:#333;
}

input, select{
  width:100%;
  padding:14px;
  border-radius:10px;
  border:1px solid #ccc;
  font-size:1rem;
}

.submit{
  width:100%;
  border:none;
  padding:16px;
  border-radius:12px;
  background:#0b3d91;
  color:white;
  font-size:1rem;
  font-weight:bold;
  cursor:pointer;
  transition:0.3s;
}

.submit:hover{
  background:#072c69;
}

.submit:disabled{
  opacity:0.7;
  cursor:not-allowed;
}

.success{
  display:none;
  margin-top:25px;
  text-align:center;
  padding:30px;
  background:#ecfff1;
  border:2px solid #8ce3aa;
  border-radius:18px;
}

.folio{
  font-size:3rem;
  font-weight:bold;
  color:#0b3d91;
  margin-top:15px;
}

.note{
  margin-top:15px;
  color:#666;
}

.counter{
  text-align:center;
  margin-bottom:20px;
  color:#555;
  font-weight:bold;
}

</style>
</head>

<body>

<div class="container">

<div class="header">
  <h1>FERIA DE EMPLEADORES 2026</h1>
  <p>Universidad Veracruzana - Ingeniería</p>
</div>

<div class="counter">
  Registro del evento
</div>

<div class="tabs">

<button class="tab active"
onclick="showForm('student')">
Alumno
</button>

<button class="tab"
onclick="showForm('company')">
Empresa
</button>

</div>

<!-- ALUMNOS -->
<form id="studentForm" class="active">

<div class="group">
<label>Nombre completo</label>
<input type="text" required>
</div>

<div class="group">
<label>Matrícula</label>
<input type="text" required>
</div>

<div class="group">
<label>Correo UV</label>
<input type="email" required>
</div>

<div class="group">
<label>Facultad</label>

<select required>
<option value="">Selecciona</option>
<option>FIEE</option>
<option>FCQ</option>
<option>FIMCN</option>
<option>FICH</option>
<option>Otra</option>
</select>

</div>

<div class="group">
<label>Carrera</label>

<select required>
<option value="">Selecciona</option>
<option>Ingeniería Informática</option>
<option>Ingeniería Mecatrónica</option>
<option>Ingeniería Electronica y Comunicaciones</option>
<option>Ingeniería Electrica</option>
<option>Ingeniería Naval</option>
<option>Ingeniería Mecánica-eléctrica</option>
<option>Ingeniería Industrial </option>
<option>Ingeniería en Arquitectura</option>
<option>Ingeniería Topografíca Geodésica</option>
<option>Ingeniería Civil</option>
<option>Ingeniería Química</option>
<option>Ingeniería Metalurgica y ciencias ambientales</option>
<option>Ingeniería Ambiental</option>
<option>Otra</option>
</select>

</div>

<button type="submit" class="submit">
Registrarme
</button>

</form>

<!-- EMPRESAS -->
<form id="companyForm">

<div class="group">
<label>Empresa</label>
<input type="text" required>
</div>

<div class="group">
<label>Representante</label>
<input type="text" required>
</div>

<div class="group">
<label>Correo empresarial</label>
<input type="email" required>
</div>

<button type="submit" class="submit">
Registrar empresa
</button>

</form>

<!-- MENSAJE -->
<div class="success" id="successBox">

<h2>¡Registro exitoso!</h2>

<p id="successMessage">
Tu folio para la tómbola es:
</p>

<div class="folio" id="folioText">
UV-001
</div>

<div class="note">
Toma captura o guarda tu folio.
</div>

</div>

</div>

<script>

const API_URL =
"https://script.google.com/macros/s/AKfycbyCug87sOb_cZBo8zDSLsWZwG8e9vOc9SHsPxrwhQxfDEbS-u-GJ7bOvWhP87KwSz6hyA/exec";

function showForm(type){

  document.getElementById("studentForm")
    .classList.remove("active");

  document.getElementById("companyForm")
    .classList.remove("active");

  document.querySelectorAll(".tab")
    .forEach(btn => btn.classList.remove("active"));

  if(type === "student"){

    document.getElementById("studentForm")
      .classList.add("active");

    document.querySelectorAll(".tab")[0]
      .classList.add("active");

  }else{

    document.getElementById("companyForm")
      .classList.add("active");

    document.querySelectorAll(".tab")[1]
      .classList.add("active");
  }

  document.getElementById("successBox")
    .style.display = "none";
}

// ALUMNOS
document.getElementById("studentForm")
.addEventListener("submit", async function(e){

e.preventDefault();

const submitButton =
  this.querySelector(".submit");

submitButton.disabled = true;
submitButton.innerText = "Registrando...";

const inputs =
  this.querySelectorAll("input, select");

const correo =
  inputs[2].value.trim().toLowerCase();

const matricula =
  inputs[1].value.trim();

// VALIDAR CORREO UV
if(
 !correo.endsWith("@estudiantes.uv.mx")
 &&
 !correo.endsWith("@uv.mx")
){

 alert("Ingresa un correo UV válido");

 submitButton.disabled = false;
 submitButton.innerText = "Registrarme";

 return;
}

// VALIDAR MATRÍCULA VACÍA
if(matricula.length < 5){

 alert("Ingresa una matrícula válida");

 submitButton.disabled = false;
 submitButton.innerText = "Registrarme";

 return;
}

const data = {
  tipo:"alumno",
  nombre:inputs[0].value.trim(),
  matricula:matricula,
  correo:correo,
  facultad:inputs[3].value,
  carrera:inputs[4].value
};

try{

const response = await fetch(API_URL,{
  method:"POST",
  body:JSON.stringify(data)
});

const result =
  await response.json();

if(result.status === "duplicado_matricula"){

  alert("Esta matrícula ya fue registrada");

  submitButton.disabled = false;
  submitButton.innerText = "Registrarme";

  return;
}

if(result.status === "duplicado_correo"){

  alert("Este correo ya fue registrado");

  submitButton.disabled = false;
  submitButton.innerText = "Registrarme";

  return;
}

document.getElementById("successMessage")
  .innerText =
  "Tu folio para la tómbola es:";

document.getElementById("folioText")
  .innerText =
  result.folio;

document.getElementById("successBox")
  .style.display = "block";

this.reset();

window.scrollTo({
  top:document.body.scrollHeight,
  behavior:"smooth"
});

}catch(error){

alert("Error al registrar");
console.error(error);

}

submitButton.disabled = false;
submitButton.innerText = "Registrarme";

});

// EMPRESAS
document.getElementById("companyForm")
.addEventListener("submit", async function(e){

e.preventDefault();

const submitButton =
  this.querySelector(".submit");

submitButton.disabled = true;
submitButton.innerText = "Registrando...";

const inputs =
  this.querySelectorAll("input");

const data = {
  tipo:"empresa",
  empresa:inputs[0].value.trim(),
  representante:inputs[1].value.trim(),
  correo:inputs[2].value.trim()
};

try{

await fetch(API_URL,{
  method:"POST",
  body:JSON.stringify(data)
});

document.getElementById("successMessage")
  .innerText =
  "Registro de empresa completado.";

document.getElementById("folioText")
  .innerText =
  "Gracias por participar";

document.getElementById("successBox")
  .style.display = "block";

this.reset();

window.scrollTo({
  top:document.body.scrollHeight,
  behavior:"smooth"
});

}catch(error){

alert("Error al registrar");
console.error(error);

}

submitButton.disabled = false;
submitButton.innerText = "Registrar empresa";

});

</script>

</body>
</html>
